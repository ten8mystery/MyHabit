<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHabit</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-raised: #27272a;
            --brand: #6366f1;
            --brand-glow: rgba(99, 102, 241, 0.3);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
            --success: #10b981;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --ring: #3f3f46;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 16px;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #09090b 70%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            position: relative;
        }

        header { text-align: center; }
        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--brand-glow));
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid var(--ring);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        input {
            width: 100%;
            padding: 14px;
            background-color: rgba(9, 9, 11, 0.6);
            border: 1px solid var(--ring);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand), #818cf8);
            color: white;
            padding: 16px;
            border-radius: var(--radius-md);
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px var(--brand-glow);
        }

        .habit-card {
            background: var(--surface);
            border: 1px solid var(--ring);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .habit-name { font-size: 1.4rem; font-weight: 800; }
        .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; line-height: 1; }
        .delete-btn:hover { color: var(--danger); }

        .stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-badge { background: var(--surface-raised); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; flex: 1; text-align: center; }
        .stat-badge b { color: var(--brand); }

        .timer { font-size: 2.5rem; font-weight: 800; text-align: center; margin: 20px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 20px var(--brand-glow); }
        .timer span { font-size: 0.9rem; color: var(--text-muted); margin-right: 6px; font-weight: 400; }

        .milestone-box { margin-bottom: 24px; }
        .milestone-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; }
        .progress-bg { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--brand), #c084fc); width: 0%; transition: width 0.5s ease; }

        .action-group { display: flex; flex-direction: column; gap: 10px; }
        .btn-action { padding: 14px; border-radius: var(--radius-md); border: none; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-danger-outline { background: transparent; border: 1px solid var(--ring); color: var(--danger); }
        .btn-danger-outline:hover { background: var(--danger-glow); border-color: var(--danger); }

        .quote-box { text-align: center; font-style: italic; color: var(--text-muted); font-size: 0.9rem; margin-top: 15px; min-height: 24px; }

        details { background: rgba(0,0,0,0.3); border-radius: 12px; margin-top: 20px; }
        summary { padding: 12px; font-size: 0.85rem; cursor: pointer; color: var(--text-muted); font-weight: 600; }
        .history-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
        .history-item { font-size: 0.85rem; border-top: 1px solid var(--ring); padding-top: 8px; }

        dialog { margin: auto; padding: 24px; background: var(--surface); color: white; border: 1px solid var(--ring); border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        textarea { width: 100%; background: var(--bg); border: 1px solid var(--ring); border-radius: 12px; color: white; padding: 12px; margin: 15px 0; outline: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <header>
            <h1>MyHabit</h1>
        </header>
        
        <div class="glass-panel">
            <div class="input-group">
                <label>Goal Name</label>
                <input type="text" id="habitInput" placeholder="Ex: No Caffeine" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Start Time</label>
                <input type="datetime-local" id="habitStart">
            </div>
            <button class="btn-primary" onclick="addHabit()">Begin Journey</button>
        </div>

        <div id="habitList"></div>
    </div>

    <dialog id="relapseDialog">
        <h3 style="color: var(--danger);">Reset Tracker</h3>
        <p style="font-size: 0.9rem; color: var(--text-muted);">Self-reflection builds strength. What happened?</p>
        <textarea id="relapseNote" placeholder="Trigger/Mood..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn-action" style="flex: 1; background: var(--surface-raised); color: white;" onclick="closeDialog()">Cancel</button>
            <button class="btn-action" style="flex: 1; background: var(--danger); color: white;" onclick="confirmRelapse()">Confirm Reset</button>
        </div>
    </dialog>

    <script>
        // BACKGROUND PARTICLES
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedY = Math.random() * 0.5 + 0.1;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(129, 140, 248, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        for(let i=0; i<50; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // APP LOGIC
        let habits = JSON.parse(localStorage.getItem('myHabitData')) || [];
        let activeId = null;
        let quotes = ["Stay strong. This craving is temporary."];
        const dialog = document.getElementById('relapseDialog');

        const MILESTONES = [
            { label: '1 Day', ms: 86400000 },
            { label: '3 Days', ms: 259200000 },
            { label: '1 Week', ms: 604800000 },
            { label: '1 Month', ms: 2592000000 },
            { label: '1 Year', ms: 31536000000 }
        ];

        async function loadQuotes() {
            try {
                const response = await fetch('quotes.json');
                if (response.ok) quotes = await response.json();
            } catch (e) { console.warn("Using fallback quotes."); }
        }
        loadQuotes();

        function triggerConfetti() {
            confetti({ particleCount: 120, spread: 80, origin: { y: 0.7 }, colors: ['#6366f1', '#c084fc', '#10b981'] });
        }

        function hitDopamineButton(id) {
            triggerConfetti();
            document.getElementById(`quote-${id}`).innerHTML = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        }

        function save() { localStorage.setItem('myHabitData', JSON.stringify(habits)); }

        function addHabit() {
            const name = document.getElementById('habitInput').value.trim();
            const dateStr = document.getElementById('habitStart').value;
            if (!name) return;
            habits.unshift({ id: Date.now(), name, startTime: dateStr ? new Date(dateStr).getTime() : Date.now(), bestStreak: 0, history: [] });
            save(); render();
            document.getElementById('habitInput').value = '';
        }

        function deleteHabit(id) {
            if (confirm("Delete this tracker?")) { habits = habits.filter(h => h.id !== id); save(); render(); }
        }

        function openDialog(id) { activeId = id; dialog.showModal(); }
        function closeDialog() { dialog.close(); }

        function confirmRelapse() {
            const h = habits.find(h => h.id === activeId);
            const diff = Date.now() - h.startTime;
            if (diff > h.bestStreak) h.bestStreak = diff;
            h.history.unshift({ date: Date.now(), note: document.getElementById('relapseNote').value || "No notes." });
            h.startTime = Date.now();
            save(); render(); closeDialog();
        }

        function formatTime(ms) {
            const d = Math.floor(ms / 86400000);
            const h = Math.floor((ms % 86400000) / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${d}<span>d</span> ${h.toString().padStart(2,'0')}<span>h</span> ${m.toString().padStart(2,'0')}<span>m</span> ${s.toString().padStart(2,'0')}<span>s</span>`;
        }

        function updateTicks() {
            habits.forEach(h => {
                const diff = Date.now() - h.startTime;
                document.getElementById(`t-${h.id}`).innerHTML = formatTime(diff);
                const nextM = MILESTONES.find(m => m.ms > diff) || MILESTONES[MILESTONES.length-1];
                document.getElementById(`p-${h.id}`).style.width = Math.min(100, (diff / nextM.ms) * 100) + '%';
                document.getElementById(`l-${h.id}`).innerText = `Goal: ${nextM.label}`;
            });
        }

        function render() {
            const container = document.getElementById('habitList');
            container.innerHTML = habits.map(h => `
                <div class="habit-card">
                    <div class="habit-header">
                        <span class="habit-name">${h.name}</span>
                        <button class="delete-btn" onclick="deleteHabit(${h.id})">&times;</button>
                    </div>
                    <div class="stats-row">
                        <div class="stat-badge">Best: <b>${Math.floor(h.bestStreak/86400000)}d</b></div>
                        <div class="stat-badge">Resets: <b>${h.history.length}</b></div>
                    </div>
                    <div class="timer" id="t-${h.id}">${formatTime(Date.now() - h.startTime)}</div>
                    <div class="milestone-box">
                        <div class="milestone-text"><span id="l-${h.id}">Goal: -</span></div>
                        <div class="progress-bg"><div class="progress-fill" id="p-${h.id}"></div></div>
                    </div>
                    <div class="action-group">
                        <button class="btn-action btn-success" onclick="hitDopamineButton(${h.id})">I have a craving</button>
                        <button class="btn-action btn-danger-outline" onclick="openDialog(${h.id})">I slipped up</button>
                    </div>
                    <div class="quote-box" id="quote-${h.id}"></div>
                    ${h.history.length ? `
                        <details>
                            <summary>Journal (${h.history.length})</summary>
                            <div class="history-list">${h.history.map(e => `
                                <div class="history-item">
                                    <span style="color:var(--brand);font-size:0.75rem;display:block;">${new Date(e.date).toLocaleDateString()}</span>
                                    ${e.note}
                                </div>`).join('')}</div>
                        </details>
                    ` : ''}
                </div>
            `).join('');
            updateTicks();
        }

        setInterval(updateTicks, 1000);
        render();
    </script>
</body>
</html>
