<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHabit</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-raised: #27272a;
            --brand: #6366f1;
            --brand-glow: rgba(99, 102, 241, 0.2);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
            --success: #10b981;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --ring: #3f3f46;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        header {
            text-align: center;
            margin-top: 10px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--ring);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(9, 9, 11, 0.5);
            border: 1px solid var(--ring);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--brand), #818cf8); color: white; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-danger-outline { background: transparent; color: var(--danger); border: 1px solid var(--ring); width: 100%; margin-top: 10px; }
        .btn-danger-outline:hover { background: var(--danger-glow); border-color: var(--danger); }

        .habit-card {
            background-color: var(--surface);
            border: 1px solid var(--ring);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .habit-name { font-size: 1.25rem; font-weight: 700; }
        .delete-btn { background: none; color: var(--text-muted); font-size: 1.5rem; width: 32px; height: 32px; padding: 0; }
        .delete-btn:hover { color: var(--danger); }

        .timer-display { text-align: center; margin: 15px 0; }
        .timer { font-size: 2.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        .timer span { font-size: 0.9rem; color: var(--text-muted); margin-right: 6px; }

        .streak-badge {
            background: var(--surface-raised);
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .streak-badge b { color: var(--brand); }

        .milestone-container { margin-bottom: 20px; }
        .milestone-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
        .progress-bar { height: 6px; background: var(--surface-raised); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--brand); width: 0%; transition: width 0.5s; }

        details { background: rgba(0,0,0,0.2); border-radius: 8px; margin-top: 10px; }
        summary { padding: 10px; font-size: 0.85rem; cursor: pointer; color: var(--text-muted); }
        .history-list { padding: 0 10px 10px; display: flex; flex-direction: column; gap: 8px; }
        .history-item { font-size: 0.85rem; border-top: 1px solid var(--ring); padding-top: 8px; }
        .history-date { color: var(--brand); font-weight: 600; font-size: 0.75rem; display: block; }

        dialog { margin: auto; padding: 24px; background: var(--surface); color: white; border: 1px solid var(--ring); border-radius: 16px; width: 90%; max-width: 400px; }
        dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .dialog-btns { display: flex; gap: 10px; margin-top: 15px; }
        .dialog-btns button { flex: 1; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>MyHabit</h1>
        </header>
        
        <div class="glass-panel">
            <div class="input-group">
                <input type="text" id="habitInput" placeholder="What are you quitting?" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Start Date & Time</label>
                <input type="datetime-local" id="habitStart">
            </div>
            <button class="btn-primary" onclick="addHabit()">Begin Journey</button>
        </div>

        <div id="habitList"></div>
    </div>

    <dialog id="relapseDialog">
        <h3 style="margin-bottom: 10px; color: var(--danger);">Relapse Log</h3>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">What happened? Writing it down helps prevent it next time.</p>
        <textarea id="relapseNote" placeholder="Notes..."></textarea>
        <div class="dialog-btns">
            <button class="btn-cancel" style="background: var(--surface-raised); color: white;" onclick="closeDialog()">Cancel</button>
            <button class="btn-confirm" style="background: var(--danger); color: white;" onclick="confirmRelapse()">Reset Timer</button>
        </div>
    </dialog>

    <script>
        let habits = JSON.parse(localStorage.getItem('myHabitData')) || [];
        let activeId = null;
        const dialog = document.getElementById('relapseDialog');

        const MILESTONES = [
            { label: '1 Day', ms: 86400000 },
            { label: '3 Days', ms: 259200000 },
            { label: '1 Week', ms: 604800000 },
            { label: '1 Month', ms: 2592000000 },
            { label: '1 Year', ms: 31536000000 }
        ];

        function save() { localStorage.setItem('myHabitData', JSON.stringify(habits)); }

        function addHabit() {
            const name = document.getElementById('habitInput').value.trim();
            const dateStr = document.getElementById('habitStart').value;
            if (!name) return;

            habits.unshift({
                id: Date.now(),
                name: name,
                startTime: dateStr ? new Date(dateStr).getTime() : Date.now(),
                bestStreak: 0,
                history: []
            });

            save();
            render();
            document.getElementById('habitInput').value = '';
        }

        function deleteHabit(id) {
            if (confirm("Delete this tracker?")) {
                habits = habits.filter(h => h.id !== id);
                save(); render();
            }
        }

        function openDialog(id) { activeId = id; dialog.showModal(); }
        function closeDialog() { dialog.close(); }

        function confirmRelapse() {
            const habit = habits.find(h => h.id === activeId);
            const note = document.getElementById('relapseNote').value;
            const currentStreak = Date.now() - habit.startTime;

            if (currentStreak > habit.bestStreak) habit.bestStreak = currentStreak;
            
            habit.history.unshift({
                date: Date.now(),
                note: note || "No notes.",
                lostStreak: currentStreak
            });

            habit.startTime = Date.now();
            save(); render(); closeDialog();
        }

        function getTimeStrings(ms) {
            const d = Math.floor(ms / 86400000);
            const h = Math.floor((ms % 86400000) / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${d}<span>d</span> ${h.toString().padStart(2,'0')}<span>h</span> ${m.toString().padStart(2,'0')}<span>m</span> ${s.toString().padStart(2,'0')}<span>s</span>`;
        }

        function updateTicks() {
            habits.forEach(h => {
                const now = Date.now();
                const diff = now - h.startTime;
                
                const timerEl = document.getElementById(`t-${h.id}`);
                if (timerEl) timerEl.innerHTML = getTimeStrings(diff);

                const nextM = MILESTONES.find(m => m.ms > diff) || MILESTONES[MILESTONES.length-1];
                const bar = document.getElementById(`p-${h.id}`);
                if (bar) bar.style.width = Math.min(100, (diff / nextM.ms) * 100) + '%';
                
                const label = document.getElementById(`l-${h.id}`);
                if (label) label.innerText = `Goal: ${nextM.label}`;
            });
        }

        function render() {
            const container = document.getElementById('habitList');
            container.innerHTML = habits.map(h => `
                <div class="habit-card">
                    <div class="habit-header">
                        <span class="habit-name">${h.name}</span>
                        <button class="delete-btn" onclick="deleteHabit(${h.id})">&times;</button>
                    </div>
                    
                    <div class="streak-badge">All-time best: <b>${Math.floor(h.bestStreak/86400000)} days</b></div>

                    <div class="timer-display">
                        <div class="timer" id="t-${h.id}">${getTimeStrings(Date.now() - h.startTime)}</div>
                    </div>

                    <div class="milestone-container">
                        <div class="milestone-text">
                            <span id="l-${h.id}">Goal: -</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="p-${h.id}"></div>
                        </div>
                    </div>

                    ${h.history.length ? `
                        <details>
                            <summary>Journal (${h.history.length})</summary>
                            <div class="history-list">
                                ${h.history.map(e => `
                                    <div class="history-item">
                                        <span class="history-date">${new Date(e.date).toLocaleDateString()}</span>
                                        ${e.note}
                                    </div>
                                `).join('')}
                            </div>
                        </details>
                    ` : ''}

                    <button class="btn-danger-outline" onclick="openDialog(${h.id})">I Relapsed</button>
                </div>
            `).join('');
        }

        setInterval(updateTicks, 1000);
        render();
    </script>
</body>
</html>
