<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHabit</title>
    <style>
        :root {
            --bg-base: #0f172a;
            --accent: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Keeps the vibe clean */
        }

        /* Subtle Background Glows */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }

        .welcome-card {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
        }

        .diddy {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 18px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-start {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            background: #4f46e5;
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .footer-tag {
            margin-top: 40px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="welcome-card">
        <div class="diddy">:)</div>
        <h1>Ready to start?</h1>
        <p>Break the cycle, track your progress, and take back control of your time.</p>
        
        <a href="tracker.html" class="btn-start">Get Started</a>

        <div class="footer-tag">Your Journey Begins Today</div>
    </div>

</body>
</html>
